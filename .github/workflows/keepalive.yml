name: Manter servidor acordado

# Pinga o site a cada ~10 min para o plano gratuito do Render não hibernar.
# Assim o consultório fica disponível 24/7, sem custo e sem intervenção.
on:
  schedule:
    - cron: "*/10 * * * *"   # a cada 10 minutos (o GitHub pode atrasar alguns minutos)
  workflow_dispatch:          # permite disparar manualmente pelo painel do GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Acordar o servidor
        run: |
          URL="https://site-psiquiatria.onrender.com/healthz"
          echo "Pingando $URL"
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 --retry 2 "$URL" || echo "000")
          echo "Resposta: $code"
          if [ "$code" != "200" ]; then
            echo "Aviso: resposta inesperada ($code) — pode ser o servidor acordando."
          fi
